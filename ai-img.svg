  <text x="400" y="308" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="rgba(201,79,42,0.9)" text-anchor="middle">AI</text>
  <!-- text -->
  <text x="400" y="520" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="rgba(240,235,225,0.9)" text-anchor="middle">AI Application</text>
  <text x="400" y="550" font-family="monospace" font-size="13" fill="rgba(240,235,225,0.3)" text-anchor="middle" letter-spacing="3">PROMPT · AGENT · BUILD</text>
</svg>