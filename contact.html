<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peggy Ku — Contact</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #f7f3ed;
  --ink: #1a1714;
  --rust: #B87229;
  --sage: #6b8c6e;
  --sand: #d4b896;
  --fog: #ede8de;
  --deep: #2a2420;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{background:var(--cream);color:var(--ink);font-family:'Space Mono',monospace;overflow-x:hidden;cursor:none;min-height:100vh;display:flex;flex-direction:column;}

.cursor{position:fixed;width:10px;height:10px;background:var(--rust);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:multiply;transition:width .15s,height .15s;}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid var(--rust);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.35;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2.5rem;display:flex;justify-content:space-between;align-items:center;background:rgba(247,243,237,.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(26,23,20,.08);}
.nav-back{font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;opacity:.45;transition:opacity .3s;}
.nav-back:hover{opacity:1;}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--ink);text-decoration:none;}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:8rem 2.5rem 4rem;}

.contact-wrap{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;max-width:900px;width:100%;}

.contact-left{}
.contact-label{font-size:13px;letter-spacing:.25em;text-transform:uppercase;color:var(--rust);margin-bottom:1rem;}
.contact-title{font-family:'Playfair Display',serif;font-size:clamp(3rem,7vw,5.5rem);font-weight:900;line-height:.9;color:var(--ink);letter-spacing:-.02em;margin-bottom:2rem;}
.contact-title em{font-style:italic;color:var(--rust);}
.contact-desc{font-size:15px;line-height:2;color:var(--deep);opacity:.6;}

.contact-right{}
.contact-item{display:flex;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid rgba(26,23,20,.08);text-decoration:none;color:var(--ink);transition:gap .3s;}
.contact-item:first-child{border-top:1px solid rgba(26,23,20,.08);}
.contact-item:hover{gap:1.3rem;}
.contact-item:hover .contact-icon{background:var(--rust);color:var(--cream);border-color:var(--rust);}
.contact-icon{width:36px;height:36px;border:1px solid rgba(26,23,20,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .25s;color:var(--rust);}
.contact-info{}
.contact-info-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--deep);opacity:.35;margin-bottom:.2rem;}
.contact-info-value{font-size:15px;color:var(--ink);}

footer{border-top:1px solid rgba(26,23,20,.08);padding:1.2rem 2.5rem;display:flex;justify-content:space-between;align-items:center;}
.footer-copy{font-size:12px;letter-spacing:.12em;color:var(--deep);opacity:.3;}
.footer-back{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);text-decoration:none;opacity:.35;transition:opacity .25s;}
.footer-back:hover{opacity:1;}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:none;}

@media(max-width:768px){
  nav{padding:1rem 1.5rem;}
  .main{padding:7rem 1.5rem 3rem;}
  .contact-wrap{grid-template-columns:1fr;gap:3rem;}
  footer{padding:1rem 1.5rem;}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a class="nav-back" href="index.html">← 首頁</a>
  <a class="nav-logo" href="index.html">Peggy Ku</a>
</nav>

<main class="main">
  <div class="contact-wrap">
    <div class="contact-left reveal">
      <p class="contact-label">Contact</p>
      <h1 class="contact-title">Let's<br>Work<br><em>Together.</em></h1>
      <p class="contact-desc">行銷內容 · 社群策略<br>短影音製作 · AI 工具整合</p>
    </div>

    <div class="contact-right reveal" style="transition-delay:.15s;">
      <a class="contact-item" href="tel:0979674670">
        <div class="contact-icon">☎</div>
        <div class="contact-info">
          <p class="contact-info-label">電話</p>
          <p class="contact-info-value">0979-674-670</p>
        </div>
      </a>
      <a class="contact-item" href="mailto:peggyku91@gmail.com">
        <div class="contact-icon">@</div>
        <div class="contact-info">
          <p class="contact-info-label">Email</p>
          <p class="contact-info-value">peggyku91@gmail.com</p>
        </div>
      </a>
      <a class="contact-item" href="#">
        <div class="contact-icon">◎</div>
        <div class="contact-info">
          <p class="contact-info-label">地點</p>
          <p class="contact-info-value">臺北市</p>
        </div>
      </a>
      <a class="contact-item" href="https://www.linkedin.com/in/古姵蓁peggyku/" target="_blank">
        <div class="contact-icon">in</div>
        <div class="contact-info">
          <p class="contact-info-label">LinkedIn</p>
          <p class="contact-info-value">古姵蓁 Peggy Ku</p>
        </div>
      </a>
    </div>
  </div>
</main>

<footer>
  <p class="footer-copy">© 2026 Peggy Ku</p>
  <a class="footer-back" href="index.html">← 返回首頁</a>
</footer>

<script>
const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
document.querySelectorAll('a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.width='18px';cur.style.height='18px';});
  el.addEventListener('mouseleave',()=>{cur.style.width='10px';cur.style.height='10px';});
});
const reveals=document.querySelectorAll('.reveal');
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
},{threshold:.1});
reveals.forEach(el=>obs.observe(el));
</script>
</body>
</html>
